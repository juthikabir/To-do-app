<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do-List</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!--APP SHELL-->
<div class="app-shell">

  <!--SIDEBAR-->
  <div class="sidebar" id="sidebar">

    <!-- User row -->
    <div class="sidebar-user">
      <div class="user-avatar">T</div>
      <span class="user-name">My Task</span>
      <button class="icon-btn" title="Search" id="btn-search-toggle">
        <i class="bi bi-search"></i>
      </button>
    </div>

    <!-- Search box (hidden by default) -->
    <div class="sidebar-search-wrap" id="search-wrap" style="display:none;">
      <input type="text" id="search-input" class="sidebar-search-input" placeholder="Search tasks…" />
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav">

      <button class="nav-item active" data-filter="all">
        <span class="nav-icon ni-blue"><i class="bi bi-house-fill"></i></span>
        <span class="nav-label">All Tasks</span>
        <span class="nav-count" id="count-all"></span>
      </button>

      <button class="nav-item" data-filter="today">
        <span class="nav-icon ni-orange"><i class="bi bi-sun-fill"></i></span>
        <span class="nav-label">My Day</span>
        <span class="nav-count" id="count-today"></span>
      </button>

      <button class="nav-item" data-filter="incomplete">
        <span class="nav-icon ni-red"><i class="bi bi-circle-fill"></i></span>
        <span class="nav-label">Incomplete</span>
        <span class="nav-count" id="count-incomplete"></span>
      </button>

      <button class="nav-item" data-filter="completed">
        <span class="nav-icon ni-green"><i class="bi bi-check-circle-fill"></i></span>
        <span class="nav-label">Completed</span>
        <span class="nav-count" id="count-completed"></span>
      </button>

      <div class="nav-divider"></div>

      <button class="nav-item" data-filter="tomorrow">
        <span class="nav-icon ni-purple"><i class="bi bi-calendar-plus-fill"></i></span>
        <span class="nav-label">Tomorrow</span>
        <span class="nav-count" id="count-tomorrow"></span>
      </button>

      <button class="nav-item" data-filter="thisweek">
        <span class="nav-icon ni-teal"><i class="bi bi-calendar-week-fill"></i></span>
        <span class="nav-label">This Week</span>
        <span class="nav-count" id="count-thisweek"></span>
      </button>

      <button class="nav-item" data-filter="overdue">
        <span class="nav-icon ni-crimson"><i class="bi bi-alarm-fill"></i></span>
        <span class="nav-label">Overdue</span>
        <span class="nav-count" id="count-overdue"></span>
      </button>

    </nav>

    <!-- Sort -->
    <div class="sidebar-sort">
      <p class="sort-heading"><i class="bi bi-arrow-down-up"></i> Sort by</p>
      <select class="sort-select" id="sort-select">
        <option value="created-desc">Created (Newest first)</option>
        <option value="created-asc">Created (Oldest first)</option>
        <option value="due-asc">Due date (Earliest first)</option>
        <option value="due-desc">Due date (Latest first)</option>
        <option value="status">Completion status</option>
      </select>
    </div>

  </div>

  <!-- Sidebar backdrop(mobile) -->
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

  <!--MAIN-->
  <div class="main-panel">

    <!-- Topbar -->
    <div class="topbar">
      <button class="icon-btn d-lg-none" id="sidebar-toggle">
        <i class="bi bi-list"></i>
      </button>
      <h1 class="page-title" id="page-title">All Tasks</h1>
      <div class="topbar-right">
        <span class="overdue-pill" id="overdue-pill" style="display:none;">
          <i class="bi bi-alarm-fill"></i>
          <span id="chip-overdue-count">0</span> overdue
        </span>
      </div>
    </div>

    <!-- Add task -->
    <div class="add-task-bar">
      <button class="add-plus-btn" id="btn-open-modal">
        <i class="bi bi-plus-lg"></i>
      </button>
      <input type="text" id="quick-add-input" class="add-task-input" placeholder="Add a task" autocomplete="off"/>
    </div>

    <!-- Task list -->
    <div class="task-list-area" id="task-list"></div>

    <!-- Empty state -->
    <div class="empty-state" id="empty-state" style="display:none;">
      <i class="bi bi-clipboard2-check empty-icon"></i>
      <p class="empty-title">Nothing here</p>
      <p class="empty-sub">Add a task above to get started.</p>
    </div>

  </div>
</div>

<!--ADD / EDIT MODAL -->
<div class="modal fade" id="taskModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content app-modal">

      <div class="app-modal-header">
        <h5 class="app-modal-title" id="modal-heading">Add Task</h5>
        <button class="icon-btn" data-bs-dismiss="modal"><i class="bi bi-x-lg"></i></button>
      </div>

      <div class="app-modal-body">
        <input type="hidden" id="modal-task-id" />

        <div class="field-wrap">
          <label class="field-label" for="modal-title">Title <span class="req-star">*</span></label>
          <input type="text" id="modal-title" class="field-ctrl" placeholder="What do you need to do?" />
          <p class="field-err" id="title-error" style="display:none;">Title is required.</p>
        </div>

        <div class="field-wrap">
          <label class="field-label" for="modal-desc">Description</label>
          <textarea id="modal-desc" class="field-ctrl" rows="3" placeholder="Add notes…"></textarea>
        </div>

        <div class="row g-3">
          <div class="col-sm-6">
            <div class="field-wrap mb-0">
              <label class="field-label" for="modal-due-date">
                <i class="bi bi-calendar3 me-1"></i>Due Date
              </label>
              <input type="date" id="modal-due-date" class="field-ctrl" />
            </div>
          </div>
          <div class="col-sm-6">
            <div class="field-wrap mb-0">
              <label class="field-label" for="modal-due-time">
                <i class="bi bi-clock me-1"></i>Due Time
              </label>
              <input type="time" id="modal-due-time" class="field-ctrl" />
            </div>
          </div>
        </div>
      </div>

      <div class="app-modal-footer">
        <button class="btn-ghost" data-bs-dismiss="modal">Cancel</button>
        <button class="btn-primary-app" id="btn-save-task">Save Task</button>
      </div>

    </div>
  </div>
</div>

<!--DELETE MODAL-->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content app-modal">
      <div class="app-modal-body text-center py-4 px-3">
        <div class="del-icon-ring"><i class="bi bi-trash3-fill"></i></div>
        <p class="del-title">Delete task?</p>
        <p class="del-sub">This cannot be undone.</p>
        <div class="d-flex gap-2 justify-content-center mt-3">
          <button class="btn-ghost" data-bs-dismiss="modal">Cancel</button>
          <button class="btn-danger-app" id="btn-confirm-delete">Delete</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-wrap" id="toast-wrap"></div>

<!--Task item template-->
<template id="task-template">
  <div class="task-item">
    <div class="task-check-wrap">
      <input type="checkbox" class="task-check">
    </div>
    <div class="task-content">
      <div class="task-title-text"></div>
      <div class="task-desc-text" style="display:none;"></div>
      <div class="task-chips">
        <span class="chip due-chip" style="display:none;">
          <i class="bi bi-calendar3"></i>
          <span class="due-label"></span>
        </span>
        <span class="chip chip-done done-chip" style="display:none;">
          <i class="bi bi-check-circle"></i> Done
        </span>
      </div>
    </div>
    <div class="task-actions">
      <button class="act-btn edit" title="Edit"><i class="bi bi-pencil"></i></button>
      <button class="act-btn dupe" title="Duplicate"><i class="bi bi-copy"></i></button>
      <button class="act-btn del"  title="Delete"><i class="bi bi-trash3"></i></button>
    </div>
  </div>
</template>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
